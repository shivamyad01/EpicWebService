version: "3.8"

services:
  # ── Shopify App ─────────────────────────────
  app:
    image: ghcr.io/shivamyad01/epicwebservice:latest
    container_name: epicfulfill-app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=8081
      - HOST=https://fulfill.epicnexusgroup.com
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
    networks:
      - web
    expose:
      - "8081"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/auth"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx Reverse Proxy ─────────────────────
  nginx:
    image: nginx:alpine
    container_name: epicfulfill-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - web

# ── Volumes ───────────────────────────────────
volumes:
  app_data:
  app_uploads:

# ── Network ───────────────────────────────────
networks:
  web:
