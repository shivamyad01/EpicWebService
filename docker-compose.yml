version: "3.8"

services:
  # ── Shopify App ──────────────────────────────────────────────────
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-github-username/epicwebservice}:latest
    container_name: epicfulfill-app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=8081
      - HOST=https://fulfill.epicnexusgroup.com
    volumes:
      - app_data:/app/data          # SQLite database persistence
      - app_uploads:/app/uploads    # Uploaded files
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/auth"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx Reverse Proxy + SSL ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: epicfulfill-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      - app
    networks:
      - web

  # ── Certbot (SSL certificates) ──────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: epicfulfill-certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Renew certificates automatically
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done'"
    networks:
      - web

volumes:
  app_data:
  app_uploads:
  certbot_etc:
  certbot_var:
  certbot_webroot:

networks:
  web:
    driver: bridge
