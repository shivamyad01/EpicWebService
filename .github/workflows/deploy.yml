name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════════════════════════════
  # 1. Build Docker image and push to GHCR
  # ════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SHOPIFY_API_KEY=${{ secrets.SHOPIFY_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════════
  # 2. Deploy to VPS via SSH
  # ════════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Debug SSH Connection
        run: |
          echo "VPS Host: ${{ secrets.VPS_HOST }}"
          echo "VPS User: ${{ secrets.VPS_USER }}"
          echo "VPS Port: ${{ secrets.VPS_SSH_PORT || 22 }}"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 60s
          connect_timeout: 30s
          command_timeout: 10m
          script: |
            set -e

            # Navigate to app directory
            cd /var/www/EpicWebService

            # Login to GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker pull ghcr.io/${{ github.repository }}:latest

            # Restart services with zero-downtime
            docker compose up -d --no-deps --remove-orphans app

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployment complete!"
