name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: shivamyad01/epicwebservice

jobs:

# ═══════════════════════════════════════
# 1. Build Docker Image & Push to GHCR
# ═══════════════════════════════════════
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: shivamyad01
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/shivamyad01/epicwebservice
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            SHOPIFY_API_KEY=${{ secrets.SHOPIFY_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ═══════════════════════════════════════
# 2. Deploy to VPS via SSH
# ═══════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m

          script: |
            set -e

            echo "🚀 Starting deployment..."

            cd /var/www/EpicWebService

            echo "🔐 Logging into GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u shivamyad01 --password-stdin

            echo "⬇️ Pulling latest image..."
            docker pull ghcr.io/shivamyad01/epicwebservice:latest

            echo "🔄 Restarting container..."
            docker compose up -d --no-deps --remove-orphans app

            echo "🧹 Cleaning old Docker images..."
            docker image prune -f

            echo "✅ Deployment complete!"